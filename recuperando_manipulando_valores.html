<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Estudo jQuery</title>
        <script src="./node_modules/jquery/dist/jquery.min.js"></script>
        <script>
            //scirpt jQuery    
           $(document).ready(()=>{
                $.each($('.interesse:checked'), (indice,valor) => {
                    console.log(indice, valor)
                })
           })
        </script>
    </head>

    <body>
       <p>Nome:</p>
       <input type="text" id="nome">
       <br>
       <p>Onde você nos encontrou?</p>
       <select id="origem">
            <option value="1">google</option>
            <option value="2">facebook</option>
            <option value="3">linkedin</option>
            <option value="4">instagram</option>
            <option value="5">Tik Tok</option>
       </select>
       <br>

       <p>Sexo:</p>
       <input type="radio" name="sexo" class="sexo" value="f">Feminino<br>
       <input type="radio" name="sexo" class="sexo" value="m">Masculino<br>
       <br>
       <p>interesse: </p>
       <input type="checkbox" name="interesse" value="php">PHP<br>
       <input type="checkbox" name="interesse" value="JAVA">PHP<br>
       <input type="checkbox" name="interesse" value="Node.JS">Node.JS<br>
       <input type="checkbox" name="interesse" value="React">React<br>
    </body>
</html>
