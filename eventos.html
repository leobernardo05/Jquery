<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Estudo jQuery</title>
        <script src="./node_modules/jquery/dist/jquery.min.js"></script>
        <script>
            //scirpt jQuery    
           $(document).ready(() => {
               $('#onload').html('Pagina carregada')

               $(window).scroll(()=>{
                    $('#scroll').html('Scroll acionado')
               })

               $(window).resize(()=>{
                    $('#xyz').html('Pagina redimensionada').css('background-color', 'red')
               })

                //function / arrow function    
               $('#div1').scroll(function(){
                    $(this).css('background-color', 'blue')
               })

                //------ mouse -----
                $('#btn1').mousedown(()=>{
                    $('#div2').css('background-color', 'pink')
                })

                $('#btn1').mouseup(()=>{
                    $('#div2').css('background-color', 'green')
                })

                $('#btn1').click(()=>{
                    $('#div2').css('background-color', 'yellow')
                })

                $('#btn2').dblclick(() => {
                    $('#div2').css('background-color', 'purple')
                })

                $('#div2').mousemove((e) => {
                    // capturando 
                    console.log(e)
                    $('#resultadoDiv1: ').html('X: ' + e.offsetX + ' / Y: ' + e.offsetY)
                })

                // $('#divExterna').mouseover(()=>{
                //     $('#resultadoDiv1').html('entrou')
                // })

                $('#divExterna').mouseenter(()=>{
                    $('#resultadoDiv1').html('entrou')
                })

            });
        </script>
    </head>

    <body>
       <div id="topo">
            <h1>Eventos</h1>
       </div>

       <div>
           <h3>Browser</h3>
           <span>Onload: </span><span id="onload">?</span><br>
           <span>Scroll: </span><span id="scroll">?</span><br>
           <span>Window: </span><span id="xyz">?</span>
           <div style="height: 100px; height: 100px; border: solid 1px; overflow-y: scroll;"></div>
           <hr/>

           <h3>Mouse</h3>
           <button id="btn1" type="button">Clique aqui</button>
           <button type="button">Clique aqui 2x</button>
           <div id="div2" style="background-color: red; width: 80px; height: 50px; margin: 0;"></div>
           <span>Resultado do evento sobre a div</span>
            <div id="divExterna" style="background-color: gray; width: 80px; height: 50px; margin: 0;"></div>
            <div>Resultado: </div><span id="resultadoDiv1">?</span>

           <hr>

           <h3>Teclado</h3>
           <span>Nome:</span>
       </div>
    </body>
</html>
