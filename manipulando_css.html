<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Estudo jQuery</title>
        <script src="./node_modules/jquery/dist/jquery.min.js"></script>
        <script>
            //scirpt jQuery    
           $(document).ready(() => {
                $('#topo').css({
                    'background-color': '#155661',
                    'margin': '0px',
                    'padding': '10px 20px 10px 20px'
                });

                $('#contato').css({
                    'background-color': '#162031',
                    'margin': '0px',
                    'padding': '10px 20px 10px 20px',
                    'text-color': 'white'
                });
            });
        </script>
    </head>

    <body>
       <div id="topo">
            <h1>Barra de navegação da aplicação</h1>
       </div>

       <div>
            <h3 id="contato">Contato</h3>
            <hr>

            <p>Nome:</p>
            <input type="text">
            <br>

            <p>Email:</p>
            <input type="text">
            <br>

            <p>Mensagem:</p>
            <textarea name="" id=""></textarea>
            <br>

       </div>
    </body>
</html>
